# Deploy nach PHASE-17-Plan (A.5, scharfgeschaltet 2026-07-17):
# feuert den ploi.io-Deploy-Webhook NUR, wenn der „Test"-Workflow auf main
# grün durchgelaufen ist — lint/typecheck bleiben bewusst Warnlampen
# (Beschluss A.10 #9). `workflow_dispatch` als manueller Hebel bleibt.
#
# Aktivierung am Go-Live-Tag (Teil B, Block 8):
#   1. ploi → Site comments.pukalani.app → Deploy-Webhook-URL kopieren
#   2. Repo-Secret PLOI_DEPLOY_WEBHOOK_COMMENTS = Webhook-URL
# Ohne das Secret ist der curl ein no-op (Guard unten) — der Workflow ist
# damit gefahrlos schon VOR dem Go-Live auf main.
#
# Env Vars (NUXT_APPWRITE_KEY etc.) leben als Site-Environment in ploi.io —
# NIE im Repo; ploi „Quick Deploy" bleibt AUS (sonst deployt ungetesteter
# Code an den Actions vorbei).

name: Deploy

on:
  workflow_run:
    workflows: [Test]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions: {}

concurrency:
  group: deploy-comments
  cancel-in-progress: false

jobs:
  deploy-comments:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Trigger ploi.io deploy webhook
        id: webhook
        env:
          WEBHOOK: ${{ secrets.PLOI_DEPLOY_WEBHOOK_COMMENTS }}
        run: |
          if [ -z "$WEBHOOK" ]; then
            echo "Secret PLOI_DEPLOY_WEBHOOK_COMMENTS nicht gesetzt — Deploy übersprungen (Go-Live Block 8)."
            echo "triggered=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          curl -fsS -X POST "$WEBHOOK"
          echo "triggered=true" >> "$GITHUB_OUTPUT"

      # Härtung (2026-07-19): ploi verschluckt Webhooks, die während eines
      # laufenden Deploys eintreffen — dieser Schritt macht das SICHTBAR.
      # /api/health liefert seither den gebauten Commit (buildSha, Build-Zeit
      # aus git); wir pollen, bis Prod den erwarteten SHA meldet, sonst rot.
      # Bei workflow_run zählt der SHA des auslösenden Test-Laufs.
      - name: Verify deployed commit
        if: steps.webhook.outputs.triggered == 'true'
        env:
          EXPECTED_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          HEALTH_URL: https://comments.pukalani.app/api/health
        run: |
          echo "Erwarte Commit $EXPECTED_SHA auf $HEALTH_URL (Build ~3-5 min) …"
          for i in $(seq 1 40); do
            BUILD=$(curl -fsS -m 15 "$HEALTH_URL" | jq -r '.build // empty' || true)
            if [ "$BUILD" = "$EXPECTED_SHA" ]; then
              echo "✔ Prod läuft auf $BUILD"
              exit 0
            fi
            echo "  ($i/40) Prod meldet '${BUILD:-n/a}' — warte 20 s …"
            sleep 20
          done
          echo "✗ Prod hat $EXPECTED_SHA nach ~13 min nicht erreicht — ploi-Deploy prüfen (verschluckter Webhook? Build-Fehler?)."
          exit 1
