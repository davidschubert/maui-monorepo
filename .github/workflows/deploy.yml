# Deploy nach PHASE-17-Plan (A.5, scharfgeschaltet 2026-07-17):
# feuert die ploi.io-Deploy-Webhooks NUR, wenn der „Test"-Workflow auf main
# grün durchgelaufen ist — lint/typecheck bleiben bewusst Warnlampen
# (Beschluss A.10 #9). `workflow_dispatch` als manueller Hebel bleibt.
#
# Seit H2-Live (2026-07-19) deployt die Kette DREI Sites SEQUENZIELL
# (comments → portfolio → studio): der App-Server (2 Cores / 3,7 GB) verkraftet
# keine parallelen Nuxt-Builds (OOM-Kill 137 beobachtet) — deshalb wird jede
# Site erst getriggert, wenn die vorige ihren buildSha auf /api/health meldet.
#
# Aktivierung je Site: ploi → Site → Deploy-Webhook-URL kopieren →
# Repo-Secret PLOI_DEPLOY_WEBHOOK_<SITE> setzen. Ohne Secret ist der
# jeweilige Schritt ein no-op (Guard unten).
#
# Env Vars (NUXT_APPWRITE_KEY etc.) leben als Server-.env je Site —
# NIE im Repo; ploi „Quick Deploy" bleibt AUS (sonst deployt ungetesteter
# Code an den Actions vorbei).
#
# Doku-Skip (2026-07-20): ein main-Push mit AUSSCHLIESSLICH Doku-/CI-/Meta-
# Änderungen (docs/**, spikes/**, .github/**, *.md, …) baut identischen App-Output —
# ein Deploy wäre 3× Nuxt-Build für nichts. Der changes-Step vergleicht den
# aktuell auf Prod deployten Commit (comments/api/health) gegen den neuen
# Stand und ÜBERSPRINGT den Deploy, wenn keine App-relevante Datei betroffen
# ist. FAIL-SAFE: bei unbekanntem Prod-SHA, nicht auflösbarem Diff oder
# workflow_dispatch wird IMMER deployt (lieber ein Deploy zu viel als
# veraltetes Prod).

name: Deploy

on:
  workflow_run:
    workflows: [Test]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-sites
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    env:
      EXPECTED_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
    steps:
      - name: Repo auschecken (für Change-Diff)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # Nur-Doku/CI/Meta-Änderungen erkennen → Deploy überspringen.
      # Ignorierbar heißt: der App-Build-Output kann sich dadurch nicht ändern.
      # Alles andere (apps/**, packages/**, ops/**, scripts/**, package.json,
      # lockfiles, …) gilt als deploy-relevant.
      - name: Deploy nötig?
        id: changes
        run: |
          set -u
          IGNORE='^(docs/|spikes/|\.github/|\.claude/|\.codex/|.*\.md$|LICENSE$|\.gitignore$|\.editorconfig$)'
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manueller Trigger — deploye immer."
            echo "skip=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          PROD=$(curl -fsS -m 15 https://comments.pukalani.app/api/health | jq -r '.build // empty' || true)
          if [ -z "$PROD" ] || ! git cat-file -e "${PROD}^{commit}" 2>/dev/null; then
            echo "Prod-SHA unbekannt oder nicht im Repo ('${PROD:-n/a}') — deploye sicherheitshalber."
            echo "skip=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          FILES=$(git diff --name-only "$PROD" "$EXPECTED_SHA" || true)
          if [ -z "$FILES" ]; then
            echo "Keine Datei-Änderungen ggü. Prod ($PROD) — nichts zu deployen."
            echo "skip=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          RELEVANT=$(echo "$FILES" | grep -vE "$IGNORE" || true)
          if [ -z "$RELEVANT" ]; then
            echo "Nur Doku/CI/Meta geändert — Deploy übersprungen:"; echo "$FILES" | sed 's/^/  /'
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "App-relevante Änderungen — deploye:"; echo "$RELEVANT" | sed 's/^/  /'
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # Härtung (2026-07-19): ploi verschluckt Webhooks, die während eines
      # laufenden Deploys eintreffen — das Verify macht das SICHTBAR.
      # /api/health liefert den gebauten Commit (buildSha, Build-Zeit aus git);
      # wir pollen, bis Prod den erwarteten SHA meldet, sonst rot.
      # Bei workflow_run zählt der SHA des auslösenden Test-Laufs.
      - name: Deploy-Helfer definieren
        if: steps.changes.outputs.skip != 'true'
        run: |
          cat > /tmp/deploy-site.sh <<'SCRIPT'
          #!/usr/bin/env bash
          # $1 = Site-Name, $2 = Webhook-URL (leer = skip), $3 = Health-URL
          set -u
          SITE="$1"; WEBHOOK="$2"; HEALTH_URL="$3"; EXPECTED="$4"
          if [ -z "$WEBHOOK" ]; then
            echo "[$SITE] Secret nicht gesetzt — Deploy übersprungen."
            exit 0
          fi
          curl -fsS -X POST "$WEBHOOK" || { echo "[$SITE] Webhook-Call fehlgeschlagen"; exit 1; }
          echo "[$SITE] Erwarte Commit $EXPECTED auf $HEALTH_URL (Build ~3-5 min) …"
          for i in $(seq 1 40); do
            BUILD=$(curl -fsS -m 15 "$HEALTH_URL" | jq -r '.build // empty' || true)
            if [ -n "$BUILD" ]; then
              if [ "$BUILD" = "$EXPECTED" ]; then
                echo "[$SITE] ✔ Prod läuft auf $BUILD"
                exit 0
              fi
              # ploi baut IMMER latest-main. Landet WÄHREND des Deploys ein neuerer
              # Commit (der EXPECTED enthält), ist das KEIN Fehler — sonst röten sich
              # schnelle Folge-Deploys gegenseitig (Push-Race). Nur akzeptieren, wenn
              # git BEWEIST, dass EXPECTED ein Vorfahre von BUILD ist. Alles andere
              # (leerer/alter/nicht-fetchbarer BUILD) → weiter warten (fail-safe, nie false-pass).
              if git fetch -q origin "$BUILD" 2>/dev/null && git merge-base --is-ancestor "$EXPECTED" "$BUILD" 2>/dev/null; then
                echo "[$SITE] ✔ Prod läuft auf $BUILD (Nachfahre von $EXPECTED — neuerer Deploy enthält diesen Stand)"
                exit 0
              fi
            fi
            echo "[$SITE]   ($i/40) Prod meldet '${BUILD:-n/a}' — warte 20 s …"
            sleep 20
          done
          echo "[$SITE] ✗ Prod hat $EXPECTED nach ~13 min nicht erreicht — ploi-Deploy prüfen (verschluckter Webhook? Build-Fehler?)."
          exit 1
          SCRIPT
          chmod +x /tmp/deploy-site.sh

      - name: comments deployen + verifizieren
        if: steps.changes.outputs.skip != 'true'
        env:
          WEBHOOK: ${{ secrets.PLOI_DEPLOY_WEBHOOK_COMMENTS }}
        run: /tmp/deploy-site.sh comments "$WEBHOOK" "https://comments.pukalani.app/api/health" "$EXPECTED_SHA"

      - name: portfolio deployen + verifizieren
        if: steps.changes.outputs.skip != 'true'
        env:
          WEBHOOK: ${{ secrets.PLOI_DEPLOY_WEBHOOK_PORTFOLIO }}
        run: /tmp/deploy-site.sh portfolio "$WEBHOOK" "https://portfolio.pukalani.app/api/health" "$EXPECTED_SHA"

      - name: studio deployen + verifizieren
        if: steps.changes.outputs.skip != 'true'
        env:
          WEBHOOK: ${{ secrets.PLOI_DEPLOY_WEBHOOK_STUDIO }}
        run: /tmp/deploy-site.sh studio "$WEBHOOK" "https://studio.pukalani.app/api/health" "$EXPECTED_SHA"
