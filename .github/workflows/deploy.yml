# Deploy nach PHASE-17-Plan (A.5), seit 2026-07-23 als CI-BUILD-DEPLOY:
# GitHub Actions BAUT alle Apps und schiebt nur das fertige .output per
# rsync auf den Server (Symlink-Flip + pm2 reload wie bei ZDT Stufe 2).
# Der App-Server (CX23, 2 Cores / 3,7 GB) baut damit NICHTS mehr — die
# frühere RAM-Regel (nie zwei Nuxt-Builds parallel, OOM-Kill 137, 3584-MB-
# Heap für platform) betrifft nur noch den ploi-Webhook-FALLBACK (s. u.).
#
# Feuert NUR, wenn der „Test"-Workflow auf main grün durchgelaufen ist —
# lint/typecheck bleiben bewusst Warnlampen (Beschluss A.10 #9).
# `workflow_dispatch` als manueller Hebel bleibt.
#
# Zugang: dedizierter SSH-Deploy-Key (Repo-Secret PLOI_SSH_KEY, ploi-User,
# authorized_keys auf app-prod); Host-Key ist unten GEPINNT (kein blindes
# ssh-keyscan zur Laufzeit). Ohne Secret ist der Deploy ein no-op.
#
# FALLBACK (Server baut selbst): die ploi-Deploy-Scripts der 4 Sites sind
# unverändert funktionsfähig — im Notfall (Actions down) in ploi den
# Deploy-Button drücken oder die Webhooks feuern
# (Secrets PLOI_DEPLOY_WEBHOOK_* existieren weiter, werden hier aber
# nicht mehr benutzt).
#
# Env Vars (NUXT_APPWRITE_KEY etc.) leben als Server-.env je Site —
# NIE im Repo; ploi „Quick Deploy" bleibt AUS.
#
# Doku-Skip: ein main-Push mit AUSSCHLIESSLICH Doku-/CI-/Meta-Änderungen
# (docs/**, spikes/**, .github/**, *.md, …) baut identischen App-Output —
# der changes-Step vergleicht den auf Prod deployten Commit gegen den neuen
# Stand und überspringt dann. FAIL-SAFE: bei unbekanntem Prod-SHA, nicht
# auflösbarem Diff oder workflow_dispatch wird IMMER deployt.

name: Deploy

on:
  workflow_run:
    workflows: [Test]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-sites
  cancel-in-progress: false

env:
  SERVER: 49.13.211.173
  SERVER_HOSTKEY: '49.13.211.173 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIAVud82T4BSPvg5wH84jnRuP+JdG2hP52FAf+h9ckcCe'

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    env:
      EXPECTED_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
      COREPACK_ENABLE_DOWNLOAD_PROMPT: '0'
    steps:
      - name: Repo auschecken
        uses: actions/checkout@v7
        with:
          ref: ${{ env.EXPECTED_SHA }}
          fetch-depth: 0

      # Nur-Doku/CI/Meta-Änderungen erkennen → Deploy überspringen.
      - name: Deploy nötig?
        id: changes
        run: |
          set -u
          IGNORE='^(docs/|spikes/|\.github/|\.claude/|\.codex/|.*\.md$|LICENSE$|\.gitignore$|\.editorconfig$)'
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manueller Trigger — deploye immer."
            echo "skip=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          PROD=$(curl -fsS -m 15 https://comments.pukalani.app/api/health | jq -r '.build // empty' || true)
          if [ -z "$PROD" ] || ! git cat-file -e "${PROD}^{commit}" 2>/dev/null; then
            echo "Prod-SHA unbekannt oder nicht im Repo ('${PROD:-n/a}') — deploye sicherheitshalber."
            echo "skip=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          FILES=$(git diff --name-only "$PROD" "$EXPECTED_SHA" || true)
          if [ -z "$FILES" ]; then
            echo "Keine Datei-Änderungen ggü. Prod ($PROD) — nichts zu deployen."
            echo "skip=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          RELEVANT=$(echo "$FILES" | grep -vE "$IGNORE" || true)
          if [ -z "$RELEVANT" ]; then
            echo "Nur Doku/CI/Meta geändert — Deploy übersprungen:"; echo "$FILES" | sed 's/^/  /'
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "App-relevante Änderungen — deploye:"; echo "$RELEVANT" | sed 's/^/  /'
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: SSH einrichten (gepinnter Host-Key)
        if: steps.changes.outputs.skip != 'true'
        env:
          SSH_KEY: ${{ secrets.PLOI_SSH_KEY }}
        run: |
          set -u
          if [ -z "$SSH_KEY" ]; then
            echo "::error::Secret PLOI_SSH_KEY fehlt — CI-Build-Deploy kann nicht ausliefern."
            exit 1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "$SERVER_HOSTKEY" > ~/.ssh/known_hosts
          printf 'Host prod\n  HostName %s\n  User ploi\n  IdentityFile ~/.ssh/deploy_key\n  IdentitiesOnly yes\n' "$SERVER" >> ~/.ssh/config

      - uses: pnpm/action-setup@v6
        if: steps.changes.outputs.skip != 'true'
      - uses: actions/setup-node@v7
        if: steps.changes.outputs.skip != 'true'
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install
        if: steps.changes.outputs.skip != 'true'
        run: pnpm install --frozen-lockfile

      # Alle Apps auf DIESEM Runner bauen (sequenziell, 4c/16GB — kein
      # Server-RAM-Druck mehr), dann je App ausliefern + verifizieren.
      - name: Apps bauen
        if: steps.changes.outputs.skip != 'true'
        run: |
          set -eu
          for app in comments portfolio studio platform; do
            echo "::group::Build $app"
            pnpm --filter "$app" build
            echo "::endgroup::"
          done

      - name: Ausliefern + verifizieren (rsync → Symlink-Flip → pm2 reload)
        if: steps.changes.outputs.skip != 'true'
        run: |
          set -eu
          declare -A SITE=( [comments]=comments.pukalani.app [portfolio]=portfolio.pukalani.app [studio]=studio.pukalani.app [platform]=platform.pukalani.app )
          for app in comments portfolio studio platform; do
            site="${SITE[$app]}"
            echo "::group::Deploy $app → $site"
            RELEASES="/home/ploi/releases/$app"
            RELEASE="$RELEASES/$EXPECTED_SHA"
            rsync -az --delete "apps/$app/.output/" "prod:$RELEASE/"
            # Flip + Reload wie im bisherigen ploi-Script (ZDT Stufe 2):
            # git pull hält ops/ecosystem-*.config.cjs im Site-Checkout aktuell
            # (dort baut niemand mehr — der Checkout liefert nur Configs/Scripts).
            ssh prod "set -eu
              git -C /home/ploi/$site pull -q origin main || echo 'WARN: git pull im Site-Checkout fehlgeschlagen (ops-Configs evtl. alt)'
              ln -s '$RELEASE' '$RELEASES/current.tmp'
              mv -Tf '$RELEASES/current.tmp' '$RELEASES/current'
              pm2 startOrReload /home/ploi/$site/ops/ecosystem-$app.config.cjs --update-env
              pm2 save
              ls -1dt $RELEASES/*/ 2>/dev/null | tail -n +6 | xargs -r rm -rf
              echo '$app geflippt auf $EXPECTED_SHA'"
            echo "::endgroup::"

            echo "[$app] Erwarte Commit $EXPECTED_SHA auf https://$site/api/health …"
            ok=""
            for i in $(seq 1 12); do
              BUILD=$(curl -fsS -m 15 "https://$site/api/health" | jq -r '.build // empty' || true)
              if [ "$BUILD" = "$EXPECTED_SHA" ]; then
                echo "[$app] ✔ Prod läuft auf $BUILD"; ok=1; break
              fi
              echo "[$app]   ($i/12) Prod meldet '${BUILD:-n/a}' — warte 5 s …"
              sleep 5
            done
            if [ -z "$ok" ]; then
              echo "::error::[$app] Prod hat $EXPECTED_SHA nach ~60 s nicht erreicht — pm2-Logs prüfen."
              exit 1
            fi
          done
