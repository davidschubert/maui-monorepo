version: 2
updates:
  # GitHub-Action-Versionen aktuell halten (Supply-Chain: floating @vN-Tags)
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci

  # npm/pnpm-Workspace-Dependencies (liest pnpm-lock.yaml)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
